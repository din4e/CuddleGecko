root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main.exe"
  cmd = "go build -o ./tmp/main.exe ./cmd/server"
  delay = 1000
  exclude_dir = ["web", "tmp", "vendor", "data", "build", "node_modules"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "toml", "yaml"]
  kill_delay = 500
  send_interrupt = true

[log]
  time = true

[misc]
  clean_on_exit = true
